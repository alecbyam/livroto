name: Build Android APK & AAB

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      # Build Debug APK (pour les PR et tests)
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: livroto-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # Build Release AAB (pour le Play Store) — seulement sur push vers main ou tag
      - name: Setup Keystore (release only)
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/livroto-release.keystore
            echo "Keystore decoded successfully"
          else
            echo "No keystore configured — skipping signed build"
          fi

      - name: Build Release AAB (Play Store)
        if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && env.KEYSTORE_EXISTS == 'true'
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/livroto-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_EXISTS: ${{ secrets.KEYSTORE_BASE64 != '' && 'true' || 'false' }}
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon

      - name: Upload Release AAB
        if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && env.KEYSTORE_EXISTS == 'true'
        uses: actions/upload-artifact@v4
        env:
          KEYSTORE_EXISTS: ${{ secrets.KEYSTORE_BASE64 != '' && 'true' || 'false' }}
        with:
          name: livroto-release-aab-${{ github.sha }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90
